# Oeil — Nginx Configuration
# Proxies the web UI, API, and go2rtc streams

server {
    listen 80;
    server_name _;

    client_max_body_size 0;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    # ── Oeil Web UI + API ────────────────────────────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:8090;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        # WebSocket support (for /ws/events)
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_buffering     off;
    }

    # ── go2rtc API + HLS streams ──────────────────────────────────────────────
    location /go2rtc/ {
        proxy_pass          http://127.0.0.1:1984/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_buffering     off;
        # HLS needs chunked transfer
        proxy_cache         off;
        add_header          Cache-Control "no-cache";
    }

    # ── Recordings (served directly by Nginx for performance) ─────────────────
    location /recordings/ {
        alias               /var/lib/oeil/recordings/;
        mp4;
        mp4_buffer_size     1m;
        mp4_max_buffer_size 5m;
        add_header          Access-Control-Allow-Origin "*";
        # Restrict to authenticated requests — handled by API token check
        # For production: add auth_request /api/auth/verify;
    }

    # ── Snapshots ─────────────────────────────────────────────────────────────
    location /snapshots/ {
        alias               /var/lib/oeil/snapshots/;
        add_header          Access-Control-Allow-Origin "*";
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
}

